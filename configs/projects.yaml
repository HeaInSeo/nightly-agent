projects:
  - name: dag-go
    path: /opt/go/src/github.com/HeaInSeo/dag-go
    github_url: https://github.com/HeaInSeo/dag-go
    base_branch: HEAD~3
    remote_first: true
    review:
      include:
        - "*.go"
        - "*.mod"
      exclude:
        - vendor/**
    commands:
      build: "go build ./..."
      test: "go test ./..."

  - name: tori
    path: /opt/go/src/github.com/HeaInSeo/tori
    github_url: https://github.com/HeaInSeo/tori
    base_branch: HEAD~3
    remote_first: true
    review:
      include:
        - "*.go"
        - "*.mod"
        - "*.sum"
      exclude:
        - vendor/**
        - testdata/**
    commands:
      test: "go test ./..."
      lint: "make lint"
      build: "go build ./..."

  - name: DagEdit
    path: /opt/dotnet/src/github.com/HeaInSeo/DagEdit
    github_url: https://github.com/HeaInSeo/DagEdit
    base_branch: HEAD~3
    remote_first: true
    review:
      include:
        - "*.cs"
        - "*.csproj"
        - "*.sln"
        - "*.axaml"
      exclude:
        - bin/**
        - obj/**
    commands:
      test: "dotnet test"
      build: "dotnet build"

  - name: infra-lab
    path: /opt/go/src/github.com/HeaInSeo/infra-lab
    github_url: https://github.com/HeaInSeo/infra-lab
    base_branch: HEAD~3
    remote_first: true
    review:
      include:
        - "*.hcl"
        - "*.tf"
        - "*.yaml"
        - "*.yml"
        - "*.sh"
    commands:
      validate: "terraform validate"
      lint: "shellcheck scripts/k8s-tool.sh"
